# CodeRabbit configuration — https://docs.coderabbit.ai/reference/configuration
#
# Assertive profile with request-changes workflow: a review does not resolve
# until every finding has a disposition, which matches the repo rule that no
# finding is merged past silently. Decoration that would edit maintainer-authored
# PR bodies is disabled. path_instructions encode this project's standing
# engineering invariants per area so the review checks against them explicitly.
language: en-US
reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: false
  poem: false
  review_status: false
  sequence_diagrams: false
  changed_files_summary: false
  estimate_code_review_effort: false
  in_progress_fortune: false
  auto_review:
    enabled: true
  # Skip build output; everything else (including docs) stays in review.
  path_filters:
    - "!build/**"
  path_instructions:
    - path: "src/kernels/**"
      instructions: |
        CUDA decode kernels operating on untrusted input. Every global and
        shared memory access must be provably in bounds from the checks on
        the decoded values, never from trust in the bitstream — flag any
        read or write whose bound depends on unvalidated input as a blocking
        security finding. Check warp-cooperative correctness: shuffle and
        ballot member masks, __syncwarp/__syncthreads placement under
        divergence, and races on shared memory. Check size/offset arithmetic
        for integer overflow before use, overlap-copy semantics (LZ matches
        may overlap their destination), and anything that breaks bit-exact
        determinism. No device-side printf or assert in shipped kernels.
    - path: "src/**"
      instructions: |
        Host-side library code behind a C ABI. Every CUDA API call's return
        value is checked and propagated as a defined error code; no
        exceptions cross the C boundary; no silent fallback on failure.
        Input parsing is fail-closed: a frame/header that does not validate
        is rejected with a clear error, never partially applied; flag any
        parse path that guesses or continues after a validation failure.
        The public header stays C-compatible and minimal.
    - path: "tests/**"
      instructions: |
        The CPU references (liblz4, zlib, libzstd) are the oracle. Every
        fail-closed branch needs an explicit NEGATIVE test asserting the
        reject path. Every structural property is locked in by a conformance
        test — flag a structural change that does not extend the conformance
        suite, and any kernel change whose only tests exercise the happy
        path.
    - path: ".github/workflows/**"
      instructions: |
        CI workflows. Every action is pinned to a full commit SHA (no
        floating tags). permissions: {} at the workflow top with minimal
        per-job grants. Flag a dropped gate (build, format, tests,
        conformance) or an over-broad token.
    - path: "bench/**"
      instructions: |
        Benchmark harness. Numbers must be honest: warmup handling, multiple
        runs, and recorded GPU model, driver, CUDA version, corpus, and
        chunk-size distribution. Flag any reported number whose methodology
        is not reproducible from the code.
